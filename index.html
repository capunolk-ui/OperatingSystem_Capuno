<style>
/* --- your original CSS unchanged --- */
:root{
--bg-overlay:rgba(0,0,0,.65);
--text-light:#f8fafc;
--text-dark:#1e293b;
--accent-blue:#3b82f6;
--nav-bg:rgba(15,23,42,.95);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
background:linear-gradient(var(--bg-overlay),var(--bg-overlay)),
url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2070&auto=format&fit=crop');
background-size:cover;background-position:center;background-attachment:fixed;
color:var(--text-light);font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:120px}
.main-content{max-width:1100px;margin:0 auto;padding:60px 20px;text-align:center}
.page-card{background:#fff;border-radius:30px;padding:40px;color:var(--text-dark);
box-shadow:0 25px 60px rgba(0,0,0,.5);text-align:left}
.video-wrapper{width:100%;background:#000;border-radius:16px;overflow:hidden;margin-bottom:30px;display:none}
.video-container{position:relative;padding-bottom:56.25%;height:0}
.video-container iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.content-title{font-size:2rem;font-weight:700;color:#0f172a;margin-bottom:20px;text-transform:uppercase}
.content-text{line-height:1.8;color:#475569;margin-bottom:25px}
nav{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
background:var(--nav-bg);border-radius:60px;padding:8px 30px}
.menu{display:flex;list-style:none}
.menu-link{padding:12px 20px;color:#94a3b8;text-decoration:none;font-size:.8rem;font-weight:600;cursor:pointer}
.menu-link:hover{color:#fff}
.dropdown{position:absolute;bottom:calc(100% + 20px);left:50%;transform:translateX(-50%);
background:#fff;min-width:320px;border-radius:15px;padding:15px;opacity:0;visibility:hidden}
.menu-item:hover .dropdown{opacity:1;visibility:visible}
.dropdown div{padding:10px;cursor:pointer}
.dropdown div:hover{background:#f1f5f9;color:var(--accent-blue)}
</style>
</head>

<body onload="showHome()">

<div class="main-content">
<div id="videoWrapper" class="video-wrapper">
<div class="video-container">
<iframe id="mainPlayer" src="about:blank" allowfullscreen></iframe>
</div>
</div>
<div class="page-card" id="pageContent"></div>
</div>

<nav>
<ul class="menu">
<li class="menu-item"><a class="menu-link" onclick="showHome()">Home</a></li>

<div onclick="playVideo('https://www.youtube.com/embed/_UjVK-te7_0','RAID Installation','RAID levels implementation in Windows Server.')">

</div>

</ul>
</nav>

<script>
function playVideo(url,title,text){
document.getElementById('videoWrapper').style.display='block';
document.getElementById('mainPlayer').src=url;
document.getElementById('pageContent').innerHTML=
`<h1 class="content-title">${title}</h1>
<p class="content-text">${text}</p>`;
}

function showHome(){
document.getElementById('videoWrapper').style.display='none';
document.getElementById('pageContent').innerHTML=
`<h1 class="content-title">OPERATING SYSTEM</h1>
<p class="content-text">Welcome to the ITOS220-T portfolio.</p>`;
}

/* your existing Case Study functions kept */
</script>
